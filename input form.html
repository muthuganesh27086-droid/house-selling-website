<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <h1>REGISTER </h1>
        <H5>register your home today</H5> 
    <form>
        <label for="fname">Enter first name</label>
        <input type="text" size="10" placeholder="EX:kavi"><br>
        <label for="lname"> Enter last name</label>
        <input type="text" placeholder="EX:priyan"><br>
        <label for="date min">Date of birth</label>
        <input type="date" min="2000-01-01"><br>
        <label for="age">Age</label>
        <input type="number" placeholder="integer"><br>
        <label for="phoneNumber">Phone NO</label>
        <input type="tel" id="phoneNumber" placeholder="+91 India"><br>
        <label for="email">E-mail</label>
        <input type="email" placeholder="example.com"><br>
        <label for="ID proof">ID proof</label>
        <input type="image" placeholder="aadhar,licence,etc.."><br>
        <label for="EMI">EMI needed</label>
        <input type="checkbox"><br>
        <label for="income">Enter annual income: </label>
        <input type="number"><br>
        <label for="choose">choose your choice</label>
        <select >
            <option>1 BHK</option>
            <option>2 BHK</option>
            <option>3 BHK</option>
        </select>
        <br>
    </form>
    <label for="commands">commands about your dream home</label><br>
    <textarea name="commands about your dream home" id="commands" rows="10" cols="25">
    </textarea>
    <br>
    <a href="http://127.0.0.1:5500/submitted%20page.html">
    <button type="button">SUBMIT</button>
    </a>
</body>
</html>
